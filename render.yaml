services:
  - type: web
    name: galaxy-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: NODE_ENV
        value: production
